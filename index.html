<style>
    :root{
      --bg:#0b1020;
      --text:#e8ecff;
      --muted:#aab4e6;
      --line:rgba(255,255,255,.12);
      --shadow: 0 14px 40px rgba(0,0,0,.35);
      --radius:18px;
      --accent: rgba(0, 217, 255,.85);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial;
      background: radial-gradient(900px 420px at 20% 10%, rgba(109, 86, 255,.28), transparent 70%),
                  radial-gradient(700px 380px at 85% 0%, rgba(0, 217, 255,.22), transparent 60%),
                  var(--bg);
      color:var(--text);
      min-height:100vh;
    }
    header{
      position:sticky; top:0; z-index:20;
      backdrop-filter: blur(10px);
      background: rgba(11,16,32,.62);
      border-bottom:1px solid var(--line);
    }
    .wrap{ max-width:1100px; margin:0 auto; padding:18px 16px; }
    .top{ display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    .title{ display:flex; align-items:center; gap:10px; }
    .titleIcon{ width:28px; height:28px; display:block; flex:0 0 auto; border-radius:8px; }
    .title h1{ margin:0; font-size:20px; letter-spacing:.5px; }
    .title .hint{ color:var(--muted); font-size:13px; }

    .controls{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:flex-start; }

    .btn, .chip, select{
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color:var(--text);
      border-radius: 999px;
      padding:10px 12px;
      font-size:14px;
      outline:none;
      white-space:nowrap;
    }
select{
      padding-right:34px;
      appearance:none;
      background-image: linear-gradient(45deg, transparent 50%, rgba(255,255,255,.75) 50%),
                        linear-gradient(135deg, rgba(255,255,255,.75) 50%, transparent 50%);
      background-position: calc(100% - 16px) 55%, calc(100% - 10px) 55%;
      background-size: 6px 6px, 6px 6px;
      background-repeat:no-repeat;
    }

    /* 下拉選單未選項目：更深的灰（不同瀏覽器支援度略有差異） */
    select option{
      background: rgba(11,16,32,.96);
      color: rgba(255,255,255,.78);
    }
    select option:checked{
      background: rgba(109, 86, 255,.28);
      color: rgba(255,255,255,.95);
    }

    .btn{ cursor:pointer; transition: transform .08s ease, background .2s ease; user-select:none; }
    .btn:hover{ background: rgba(255,255,255,.10); }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{ background: rgba(109, 86, 255,.22); border-color: rgba(109, 86, 255,.45); }
    .btn.danger{ background: rgba(255, 82, 82,.18); border-color: rgba(255, 82, 82,.35); }
    .btn.ghost{ background: rgba(255,255,255,.04); }
    .btn:focus-visible, input:focus-visible, select:focus-visible, .range:focus-visible{
      outline: 3px solid rgba(0, 217, 255,.25);
      outline-offset: 2px;
    }
    .chip{ padding:6px 10px; border-radius:999px; background: rgba(255,255,255,.05); font-size:13px; color: var(--muted); }

    .range{
      -webkit-appearance:none;
      appearance:none;
      width: 120px;
      height: 10px;
      border-radius:999px;
      background: rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.12);
      padding:0;
      outline:none;
    }
    .range::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:16px;height:16px;border-radius:999px;
      background: rgba(255,255,255,.85);
      border:1px solid rgba(0,0,0,.15);
      cursor:pointer;
    }
    .range::-moz-range-thumb{
      width:16px;height:16px;border-radius:999px;
      background: rgba(255,255,255,.85);
      border:1px solid rgba(0,0,0,.15);
      cursor:pointer;
    }

    /* ===== Music progress bar ===== */
    .musicBar{
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
      border-radius: 999px;
      min-width: 260px;
      max-width: min(420px, 86vw);
    }
    .mTime{
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      color: var(--muted);
      width: 44px;
      text-align:center;
      flex: 0 0 auto;
    }
    .mSeek{
      -webkit-appearance:none;
      appearance:none;
      flex: 1 1 auto;
      height: 10px;
      border-radius:999px;
      background: rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.12);
      padding:0;
      outline:none;
      min-width: 120px;
    }
    .mSeek::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:16px;height:16px;border-radius:999px;
      background: rgba(255,255,255,.85);
      border:1px solid rgba(0,0,0,.15);
      cursor:pointer;
    }
    .mSeek::-moz-range-thumb{
      width:16px;height:16px;border-radius:999px;
      background: rgba(255,255,255,.85);
      border:1px solid rgba(0,0,0,.15);
      cursor:pointer;
    }


    main{ padding: 18px 0 36px; }

    .dropzone{
      border:1px dashed rgba(255,255,255,.25);
      border-radius: var(--radius);
      background: rgba(255,255,255,.04);
      padding:16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
    }
    .dropzone.dragover{
      border-color: rgba(0, 217, 255,.65);
      background: rgba(0, 217, 255,.08);
    }
    .dropzone .row{
      display:flex; gap:12px; align-items:center; flex-wrap:wrap; justify-content:space-between;
    }
    .dropzone .desc{ color: var(--muted); font-size: 13px; line-height: 1.5; }

    /* ===== Slideshow ===== */
    .stage{
      margin-top:14px;
      border-radius: 22px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(16, 22, 48,.55);
      box-shadow: var(--shadow);
    }
    .stageTop{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      padding: 12px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
      flex-wrap:wrap;
    }
    .stageTitle{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
      flex: 1 1 240px;
    }
    .stageTitle .t{
      font-weight:800;
      letter-spacing:.2px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .stageTitle .s{
      font-size:12px;
      color: var(--muted);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .pill{
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      opacity:.9;
    }

    .stageBtns{
      display:flex; gap:8px; align-items:center; flex-wrap:wrap;
      justify-content:flex-start;
      flex: 0 1 auto;
    }

    .stageBody{
      position:relative;
      background: rgba(0,0,0,.22);
    }
    .stageImg{
      width:100%;
      height: min(62vh, 560px);
      object-fit: contain;
      display:block;
      background: rgba(0,0,0,.12);
    }

    .navBtn{
      position:absolute;
      top:50%;
      transform: translateY(-50%);
      width:44px; height:44px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.35);
      color:var(--text);
      cursor:pointer;
      display:grid;
      place-items:center;
      font-size:18px;
      user-select:none;
    }
    .navBtn:hover{ background: rgba(0,0,0,.5); }
    .navBtn.prev{ left:10px; }
    .navBtn.next{ right:10px; }

    .progressWrap{
      height: 4px;
      background: rgba(255,255,255,.08);
      overflow:hidden;
    }
    .progressBar{
      height:100%;
      width:0%;
      background: var(--accent);
      transition: width 0.05s linear;
    }

    .stageFoot{
      padding: 10px 12px 12px;
      border-top:1px solid rgba(255,255,255,.10);
      display:flex;
      gap:12px;
      justify-content:space-between;
      flex-wrap:wrap;
      color: var(--muted);
      font-size: 13px;
      align-items:center;
    }
    .kbd{
      border:1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      border-radius:8px;
      padding:2px 6px;
      font-size:12px;
      color: var(--text);
    }

    /* Thumbnails strip */
    .thumbs{
      display:flex;
      gap:8px;
      padding: 12px;
      overflow:auto;
      background: rgba(255,255,255,.03);
      border-top:1px solid rgba(255,255,255,.08);
      scrollbar-width: thin;
    }
    .thumb{
      touch-action: manipulation;
      flex: 0 0 auto;
      width: 92px;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.2);
      cursor:pointer;
      position:relative;
    }
    .thumb img{
      width:100%;
      height:100%;
      object-fit: cover;
      display:block;
    }
    .thumb.active{
      border-color: rgba(0, 217, 255,.65);
      box-shadow: 0 0 0 3px rgba(0, 217, 255,.18) inset;
    }

    .empty{
      margin-top:14px;
      padding:16px;
      border-radius: var(--radius);
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      line-height:1.6;
    }

    input[type="file"]{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

    @media (max-width:520px){
      .stageImg{ height: min(52vh, 460px); }
      .thumb{
      touch-action: manipulation; width: 78px; border-radius: 12px; }
      .range{ width: 96px; }
    }
  
    /* Toast */
    .toast{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(10px);
      opacity: 0;
      pointer-events: none;
      background: rgba(16, 22, 48,.92);
      border:1px solid rgba(255,255,255,.14);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      transition: opacity .18s ease, transform .18s ease;
      z-index: 2000;
      max-width: min(520px, calc(100vw - 28px));
      text-align: center;
      font-size: 14px;
      letter-spacing: .2px;
    }
    .toast.show{
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

  
    /* Fullscreen: 隱藏底部縮圖列（真正全螢幕更乾淨） */
    #stage:fullscreen #thumbs,
    #stage:fullscreen .thumbs{ display:none !important; }

    /* Safari */
    #stage:-webkit-full-screen #thumbs,
    #stage:-webkit-full-screen .thumbs{ display:none !important; }

    /* 進全螢幕時讓圖片更滿版 */
    #stage:fullscreen .stageImg{ height: 100vh; }
    #stage:-webkit-full-screen .stageImg{ height: 100vh; }

    /* Fullscreen: hide top controls; hint 由 JS 控制顯示 10 秒 */
    #stage:fullscreen .stageTop{ display:none !important; }
    #stage:-webkit-full-screen .stageTop{ display:none !important; }

    .fsHint{
      display:none;
      position:absolute;
      top:10px;
      left:50%;
      transform: translateX(-50%);
      padding:10px 14px;
      border-radius:14px;
      line-height:1.25;
      white-space:pre-line;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.38);
      color: var(--text);
      font-size: 14px;
      letter-spacing: .2px;
      backdrop-filter: blur(8px);
      z-index: 50;
      pointer-events:none;
      user-select:none;
    }

    .fsHint.show{ display:block; }

    .fsHint.show{ display:block; }


    /* Music playlist */
    .playlistWrap{
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .playlistBtn{
      padding: 10px 12px;
    }
    .playlistPanel{
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      width: min(340px, calc(100vw - 32px));
      max-height: 300px;
      overflow: auto;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(16, 22, 48,.92);
      box-shadow: var(--shadow);
      display: none;
      z-index: 3000;
      padding: 8px;
    }
    .playlistPanel.show{ display:block; }
    .trackItem{
      display:flex;
      align-items:center;
      gap:10px;
      padding: 10px 10px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      cursor:pointer;
      user-select:none;
    }
    .trackItem + .trackItem{ margin-top: 8px; }
    .trackItem:hover{ background: rgba(255,255,255,.07); }
    .trackItem.active{
      border-color: rgba(0, 217, 255,.55);
      box-shadow: 0 0 0 3px rgba(0, 217, 255,.14) inset;
    }
    .trackIdx{
      width: 26px;
      height: 26px;
      border-radius: 999px;
      display:grid;
      place-items:center;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      font-size: 12px;
      color: var(--muted);
      flex: 0 0 auto;
    }
    .trackName{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      flex: 1 1 auto;
      font-size: 13px;
      color: var(--text);
    }
    .trackMeta{
      font-size: 12px;
      color: var(--muted);
      flex: 0 0 auto;
    }

    /* Fullscreen: 隱藏播放清單面板 */
    #stage:fullscreen .playlistPanel{ display:none !important; }
    #stage:-webkit-full-screen .playlistPanel{ display:none !important; }

  
    /* ===== V23 desktop / mobile layout optimization ===== */
    .title span[style*="#d4af37"]{
      flex:0 0 auto;

      .photoControlRow select,
      .photoControlRow label[for="folder"],
      .photoControlRow label[for="file"]{
        grid-column: span 2;
        width:100%;
      }

      .photoControlRow #clearPhotosBtn{
        grid-column:1 / 2;
        width:100%;
        text-align:center;
      }

      .photoControlRow #stopAllBtn{
        grid-column:2 / 3;
        width:100%;
        text-align:center;
      }

      .photoControlRow label[for="audioFolder"]{
        grid-column:3 / 5;
        width:100%;
        text-align:center;
      }
    }

    @media (max-width: 420px){
      .photoControlRow{
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

  
    /* ===== V34 mobile: add image + clear + stop-all same row ===== */
    @media (max-width: 760px){
      .photoControlRow{
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .photoControlRow select,
      .photoControlRow label[for="folder"]{
        grid-column: span 2;
        width:100%;
      }

      .photoControlRow label[for="file"]{
        grid-column:1 / 3;
        width:100%;
        text-align:center;
      }

      .photoControlRow #clearPhotosBtn{
        grid-column:3 / 4;
        width:100%;
        text-align:center;
      }

      .photoControlRow #stopAllBtn{
        grid-column:4 / 5;
        width:100%;
        text-align:center;
      }

      .photoControlRow label[for="audioFolder"]{
        grid-column:1 / 3;
        width:100%;
        text-align:center;
      }
    }

  
    /* ===== V35 mobile: music controls row layout ===== */
    @media (max-width: 760px){
      .photoControlRow label[for="audioFolder"]{
        grid-column:1 / 3;
        width:100%;
        text-align:center;
      }

      .musicControlRow{
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .musicControlRow label[for="audioFile"]{
        order:10;
        grid-column:3 / 5;
        width:100%;
        text-align:center;
      }

      .musicControlRow #musicBtn{
        order:20;
        grid-column:1 / 2;
        width:100%;
        text-align:center;
      }

      .musicControlRow #prevTrackBtn{
        order:20;
        grid-column:2 / 3;
        width:100%;
        text-align:center;
      }

      .musicControlRow #nextTrackBtn{
        order:20;
        grid-column:3 / 4;
        width:100%;
        text-align:center;
      }

      .musicControlRow #loopBtn{
        order:20;
        grid-column:4 / 5;
        width:100%;
        text-align:center;
      }

      .musicControlRow .playlistWrap{
        order:30;
        grid-column:1 / 3;
        width:100%;
      }

      .musicControlRow .playlistWrap .playlistBtn{
        width:100%;
        text-align:center;
      }

      .musicControlRow .musicBar{
        order:30;
        grid-column:3 / 5;
        width:100%;
        min-width:0;
        max-width:none;
      }

      .musicControlRow #vol{
        order:40;
        grid-column:1 / 4;
        width:100%;
      }

      .musicControlRow #muteBtn{
        order:40;
        grid-column:4 / 5;
        width:100%;
        text-align:center;
      }
    }

  
    /* ===== V36 mobile: force audio folder + audio file same row ===== */
    @media (max-width: 760px){
      .photoControlRow label[for="audioFolder"]{
        order:60;
        grid-column:1 / 3;
        width:100%;
        text-align:center;
      }

      .musicControlRow label[for="audioFile"]{
        order:10;
        grid-column:3 / 5;
        width:100%;
        text-align:center;
      }

      /* 讓加入音樂按鈕視覺上接在加入音樂資料夾右側 */
      .photoControlRow{
        display:grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .musicControlRow{
        margin-top:-8px;
      }
    }

  
    /* ===== V37 mobile fix: audio folder + audio file are truly same row ===== */
    @media (max-width: 760px){
      .photoControlRow label[for="audioFolder"]{
        display:none !important;
      }

      .musicControlRow{
        margin-top:0 !important;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .musicControlRow label[for="audioFolder"]{
        order:10;
        grid-column:1 / 3;
        width:100%;
        text-align:center;
      }

      .musicControlRow label[for="audioFile"]{
        order:10;
        grid-column:3 / 5;
        width:100%;
        text-align:center;
      }

      .musicControlRow #musicBtn{
        order:20;
        grid-column:1 / 2;
      }

      .musicControlRow #prevTrackBtn{
        order:20;
        grid-column:2 / 3;
      }

      .musicControlRow #nextTrackBtn{
        order:20;
        grid-column:3 / 4;
      }

      .musicControlRow #loopBtn{
        order:20;
        grid-column:4 / 5;
      }

      .musicControlRow .playlistWrap{
        order:30;
        grid-column:1 / 3;
        width:100%;
      }

      .musicControlRow .musicBar{
        order:30;
        grid-column:3 / 5;
        width:100%;
        min-width:0;
        max-width:none;
      }

      .musicControlRow #vol{
        order:40;
        grid-column:1 / 4;
      }

      .musicControlRow #muteBtn{
        order:40;
        grid-column:4 / 5;
      }
    }

  
    /* ===== V38: swap add-image and speed positions ===== */
    @media (max-width: 760px){
      .photoControlRow label[for="file"]{
        order:1;
      }
      .photoControlRow select#speed{
        order:2;
      }
      .photoControlRow label[for="folder"]{
        order:3;
      }
      .photoControlRow #clearPhotosBtn{
        order:4;
      }
      .photoControlRow #stopAllBtn{
        order:4;
      }
    }

  
    /* ===== V39 mobile: swap speed and photo-folder positions ===== */
    @media (max-width: 760px){
      .photoControlRow label[for="file"]{
        order:1;
      }
      .photoControlRow label[for="folder"]{
        order:2;
      }
      .photoControlRow select#speed{
        order:3;
      }
      .photoControlRow #clearPhotosBtn{
        order:4;
      }
      .photoControlRow #stopAllBtn{
        order:4;
      }
    }

  
    /* ===== V40 mobile: swap audio-file and audio-folder positions ===== */
    @media (max-width: 760px){
      .musicControlRow label[for="audioFile"]{
        order:10;
        grid-column:1 / 3;
        width:100%;
        text-align:center;
      }

      .musicControlRow label[for="audioFolder"]{
        order:10;
        grid-column:3 / 5;
        width:100%;
        text-align:center;
      }
    }

  
    /* ===== V41 mobile: force audio file + audio folder same row ===== */
    @media (max-width: 760px){
      .musicControlRow{
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .musicControlRow label[for="audioFile"]{
        order:1 !important;
        grid-column:1 / 3 !important;
        grid-row:auto !important;
        width:100%;
        text-align:center;
      }

      .musicControlRow label[for="audioFolder"]{
        order:1 !important;
        grid-column:3 / 5 !important;
        grid-row:auto !important;
        width:100%;
        text-align:center;
      }

      .musicControlRow #musicBtn{
        order:2 !important;
        grid-column:1 / 2 !important;
      }

      .musicControlRow #prevTrackBtn{
        order:2 !important;
        grid-column:2 / 3 !important;
      }

      .musicControlRow #nextTrackBtn{
        order:2 !important;
        grid-column:3 / 4 !important;
      }

      .musicControlRow #loopBtn{
        order:2 !important;
        grid-column:4 / 5 !important;
      }

      .musicControlRow .playlistWrap{
        order:3 !important;
        grid-column:1 / 3 !important;
        width:100%;
      }

      .musicControlRow .musicBar{
        order:3 !important;
        grid-column:3 / 5 !important;
        width:100%;
        min-width:0;
        max-width:none;
      }

      .musicControlRow #vol{
        order:4 !important;
        grid-column:1 / 4 !important;
      }

      .musicControlRow #muteBtn{
        order:4 !important;
        grid-column:4 / 5 !important;
      }
    }

  
    /* ===== V42 mobile: hard wrapper for audio add buttons ===== */
    .audioAddRow{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      width:100%;
    }

    .audioAddRow input[type="file"]{
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }

    @media (max-width: 760px){
      .musicControlRow .audioAddRow{
        order:1 !important;
        grid-column:1 / -1 !important;
        display:grid !important;
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        gap:8px !important;
        width:100% !important;
      }

      .musicControlRow .audioAddRow label[for="audioFile"],
      .musicControlRow .audioAddRow label[for="audioFolder"]{
        grid-column:auto !important;
        width:100% !important;
        text-align:center !important;
      }

      .musicControlRow > label[for="audioFile"],
      .musicControlRow > label[for="audioFolder"]{
        display:none !important;
      }
    }

    @media (min-width: 761px){
      .audioAddRow{
        width:auto;
        display:inline-flex;
      }
    }



    /* ===== V61: direct music switching only ===== */
    @media (max-width: 760px){
      .musicControlRow #clearMusicBtn{
        order:5 !important;
        grid-column:1 / -1 !important;
        width:100% !important;
        text-align:center !important;
      }
    }

    /* ===== V61: swap music progress and volume controls ===== */
    .musicControlRow .musicBar{
      order: 80;
    }
    .musicControlRow #vol{
      order: 70;
    }
    .musicControlRow #muteBtn{
      order: 60;
    }

    @media (max-width: 760px){
      /* 手機：百分比音量鍵移到原本進度列位置，進度列改到下一排並保留足夠寬度 */
      .musicControlRow .playlistWrap{
        order:3 !important;
        grid-column:1 / 3 !important;
        width:100% !important;
      }
      .musicControlRow #muteBtn{
        order:3 !important;
        grid-column:3 / 5 !important;
        width:100% !important;
        text-align:center !important;
      }
      .musicControlRow .musicBar{
        order:4 !important;
        grid-column:1 / -1 !important;
        width:100% !important;
        min-width:0 !important;
        max-width:none !important;
      }
      .musicControlRow #vol{
        order:5 !important;
        grid-column:1 / -1 !important;
        width:100% !important;
      }
      .musicControlRow #clearMusicBtn{
        order:6 !important;
      }
    }

  </style>

<audio id="bgm" preload="metadata"></audio>
<div aria-live="polite" class="toast" id="toast" role="status"></div>
<script>
    const fileInput = document.getElementById('file');
    const folderInput = document.getElementById('folder');
    const dropzone = document.getElementById('dropzone');
const speedSel = document.getElementById('speed');
    const clearPhotosBtn = document.getElementById('clearPhotosBtn');
    const clearMusicBtn = document.getElementById('clearMusicBtn');

    const countChip = document.getElementById('countChip');
    const posChip = document.getElementById('posChip');
    const empty = document.getElementById('empty');
    const stage = document.getElementById('stage');

    const titleName = document.getElementById('titleName');
    const titleSub = document.getElementById('titleSub');
    const infoText = document.getElementById('infoText');

    const stageImg = document.getElementById('stageImg');
    const thumbs = document.getElementById('thumbs');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const navPrev = document.getElementById('navPrev');
    const navNext = document.getElementById('navNext');
    const playBtn = document.getElementById('playBtn');
    const slideLoopBtn = document.getElementById('slideLoopBtn');
    const stopAllBtn = document.getElementById('stopAllBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const fsHint = document.getElementById('fsHint');
    const downloadBtn = document.getElementById('downloadBtn');
    const removeBtn = document.getElementById('removeBtn');

    const progressBar = document.getElementById('progressBar');

    // ===== Music controls =====
    const audioFile = document.getElementById('audioFile');
    const audioFolder = document.getElementById('audioFolder');
    const bgm = document.getElementById('bgm');
    const musicBtn = document.getElementById('musicBtn');
    const playlistBtn = document.getElementById('playlistBtn');
    const playlistPanel = document.getElementById('playlistPanel');
    const prevTrackBtn = document.getElementById('prevTrackBtn');
    const nextTrackBtn = document.getElementById('nextTrackBtn');
    const muteBtn = document.getElementById('muteBtn');
    const loopBtn = document.getElementById('loopBtn');
    const vol = document.getElementById('vol');
    const musicStatus = document.getElementById('musicStatus');
    const toast = document.getElementById('toast');

    // ===== Music volume settings =====
    const DEFAULT_MUSIC_VOLUME = 0.10;


    // ===== Music progress bar wiring =====
    const mSeek = document.getElementById('mSeek');
    const mCur = document.getElementById('mCur');
    const mDur = document.getElementById('mDur');

    function fmtTime(sec){
      if (!isFinite(sec) || sec < 0) sec = 0;
      sec = Math.floor(sec);
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return m + ':' + String(s).padStart(2,'0');
    }

    let waRaf = 0;

    function getMusicTimes(){
      if (!tracks.length) return {cur:0, dur:0};
      if (!useWebAudio){
        const dur = isFinite(bgm.duration) ? bgm.duration : 0;
        const cur = isFinite(bgm.currentTime) ? bgm.currentTime : 0;
        return {cur, dur};
      }
      const dur = waBuffer ? waBuffer.duration : 0;
      let cur = waOffset || 0;
      if (waIsPlaying && audioCtx){
        cur = (waOffset || 0) + Math.max(0, audioCtx.currentTime - waStartAt);
      }
      if (dur > 0) cur = Math.max(0, Math.min(dur, cur));
      return {cur, dur};
    }

    function updateMusicBar(){
      if (!mSeek || !mCur || !mDur) return;
      const {cur, dur} = getMusicTimes();
      mCur.textContent = fmtTime(cur);
      mDur.textContent = fmtTime(dur);
      if (!dur){
        mSeek.value = '0';
        return;
      }
      const v = Math.max(0, Math.min(1000, Math.round((cur / dur) * 1000)));
      // 避免拖曳時被 timeupdate 抢夺（用 _drag 旗標）
      if (!mSeek._drag) mSeek.value = String(v);
    }

    function stopWaRaf(){
      if (waRaf){
        cancelAnimationFrame(waRaf);
        waRaf = 0;
      }
    }

    function startWaRaf(){
      stopWaRaf();
      const loop = ()=>{
        updateMusicBar();
        if (useWebAudio && waIsPlaying) waRaf = requestAnimationFrame(loop);
        else waRaf = 0;
      };
      waRaf = requestAnimationFrame(loop);
    }

    function waSeekTo(targetSec){
      if (!useWebAudio) return;
      const dur = waBuffer ? waBuffer.duration : 0;
      const t = Math.max(0, Math.min(dur || 0, targetSec || 0));
      waOffset = t;
      if (!waIsPlaying){
        updateMusicBar();
        return;
      }
      // 正在播：重啟 source 以套用新 offset
      try{
        waStopSource();
        waSource = audioCtx.createBufferSource();
        waSource.buffer = waBuffer;
        waSource.connect(gainNode);
        waApplyVolume();
        waStartAt = audioCtx.currentTime;
        waIsPlaying = true;
        waSource.onended = ()=>{
          if (!waIsPlaying) return;
          waIsPlaying = false;
          waOffset = 0;
          handleMusicEnded();
        };
        waSource.start(0, waOffset);
        startWaRaf();
      }catch(e){}
    }

    if (mSeek){
      mSeek.addEventListener('input', ()=>{
        mSeek._drag = true;
        const {dur} = getMusicTimes();
        const v = Number(mSeek.value || 0) / 1000;
        const cur = dur ? dur * v : 0;
        mCur.textContent = fmtTime(cur);
      });
      mSeek.addEventListener('change', ()=>{
        const {dur} = getMusicTimes();
        const v = Number(mSeek.value || 0) / 1000;
        const cur = dur ? dur * v : 0;
        if (!useWebAudio){
          if (dur) bgm.currentTime = cur;
        } else {
          waSeekTo(cur);
        }
        mSeek._drag = false;
        updateMusicBar();
      });
    }

    bgm.addEventListener('loadedmetadata', updateMusicBar);
    bgm.addEventListener('durationchange', updateMusicBar);
    bgm.addEventListener('timeupdate', updateMusicBar);


    function showToast(message, ms = 2400){
      if (!toast) return;
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toast._t);
      toast._t = setTimeout(()=> toast.classList.remove('show'), ms);
    }

    // Fullscreen 提示：只顯示 10 秒
    let fsHintTimer = null;


    let tracks = [];
    let trackIndex = 0;
    let playlistLoop = true; // 循環播放清單（只有一首時等同單曲循環）

    // WebAudio 播放引擎（為了避免 Firefox 在切歌時被 Autoplay 政策擋住）
    let useWebAudio = false;
    let audioCtx = null;
    let gainNode = null;
    let waSource = null;
    let waBuffer = null;
    let waOffset = 0;
    let waStartAt = 0;
    let waIsPlaying = false;
    let waTrackIndex = -1;
function ensureAudioCtx(){
      if (audioCtx) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      audioCtx = new Ctx();
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 1;
      gainNode.connect(audioCtx.destination);
    }

    function waStopSource(){
      if (!waSource) return;
      try{ waSource.onended = null; }catch(e){}
      try{ waSource.stop(0); }catch(e){}
      try{ waSource.disconnect(); }catch(e){}
      waSource = null;
    }

    function waReset(){
      waStopSource();
      waBuffer = null;
      waOffset = 0;
      waStartAt = 0;
      waIsPlaying = false;
      waTrackIndex = -1;
    }

    function desiredMusicVolume(){
      return Math.max(0, Math.min(1, Number(vol.value || DEFAULT_MUSIC_VOLUME)));
    }

    function applyAudioOutputVolume(v){
      const val = Math.max(0, Math.min(1, Number(v || 0)));
      const out = (bgm.muted || val === 0) ? 0 : val;
      if (useWebAudio){
        ensureAudioCtx();
        if (gainNode) gainNode.gain.value = out;
      } else {
        bgm.volume = out;
      }
    }

    function waApplyVolume(){
      if (!gainNode) return;
      applyAudioOutputVolume(desiredMusicVolume());
    }

    async function waGetBuffer(i){
      ensureAudioCtx();
      if (!audioCtx) throw new Error("此瀏覽器不支援 WebAudio");
      const t = tracks[i];
      if (t && t.buffer) return t.buffer;

      // 優先用 File 取得資料（最穩）
      let ab = null;
      if (t && t.file && typeof t.file.arrayBuffer === "function"){
        ab = await t.file.arrayBuffer();
      } else if (t && t.url){
        const resp = await fetch(t.url);
        ab = await resp.arrayBuffer();
      } else {
        throw new Error("無法讀取音樂資料");
      }

      // decodeAudioData 在部分瀏覽器會「消耗」buffer，因此做 slice
      const buf = await audioCtx.decodeAudioData(ab.slice(0));
      if (t) t.buffer = buf;
      return buf;
    }

    function isMusicPausedNow(){
      return useWebAudio ? !waIsPlaying : bgm.paused;
    }


    function setMusicStatus(text){
      musicStatus.textContent = text;
    }


    function revokeTracks(){
      // 停止 WebAudio（若有）
      try{ waReset(); }catch(e){}

      for (const t of tracks){
        try{
          if (t.url && t.url.startsWith('blob:')) URL.revokeObjectURL(t.url);
        }catch(e){}
      }
      tracks = [];
      trackIndex = 0;
      bgm.pause();
      bgm.removeAttribute("src");
      bgm.load();
      useWebAudio = false;
      updateMusicBar();
      if (typeof renderPlaylist === "function") renderPlaylist();
      if (playlistPanel) playlistPanel.classList.remove("show");
    }

    function currentTrackLabel(){
      if (!tracks.length) return "音樂：未載入";
      const t = tracks[trackIndex];
      const loopTxt = playlistLoop ? " • 循環" : "";
      return `音樂：${t.name}（${trackIndex+1}/${tracks.length}）${loopTxt}`;
    }


    function handleMusicEnded(){
      if (!tracks.length) return;

      // 播完自動接下一首；直接切歌，不做直接切歌。
      if (trackIndex < tracks.length - 1){
        setTrack(trackIndex + 1, {autoplay:true});
      } else {
        if (playlistLoop){
          setTrack(0, {autoplay:true});
        } else {
          pauseMusic();
          setMusicStatus("音樂：播放結束");
          syncMusicButtons();
        }
      }
    }

    function setTrack(i, {autoplay=false} = {}){
      if (!tracks.length) return;
      trackIndex = (i + tracks.length) % tracks.length;
      const t = tracks[trackIndex];

      if (useWebAudio){
        // WebAudio：切歌時不靠 HTMLMediaElement.play()（避開 Firefox 的 autoplay 擋切歌）
        waOffset = 0;
        waBuffer = null;
        waTrackIndex = -1;
        setMusicStatus(currentTrackLabel() + (autoplay ? "（播放中）" : "（已就緒）"));
        syncMusicButtons();
        if (typeof renderPlaylist === "function") renderPlaylist();
        updateMusicBar();
        if (autoplay) tryPlayMusic();
        return;
      }

      bgm.src = t.url;
      bgm.currentTime = 0;
      updateMusicBar();
      setMusicStatus(currentTrackLabel() + (autoplay ? "（播放中）" : "（已就緒）"));
      syncMusicButtons();
      if (typeof renderPlaylist === "function") renderPlaylist();
      if (autoplay) tryPlayMusic();
    }


    function renderPlaylist(){
      if (!playlistPanel) return;
      playlistPanel.innerHTML = "";
      if (!tracks.length){
        const d = document.createElement("div");
        d.style.padding = "10px 10px";
        d.style.color = "rgba(255,255,255,.75)";
        d.style.fontSize = "13px";
        d.textContent = "尚未加入音樂";
        playlistPanel.appendChild(d);
        return;
      }
      tracks.forEach((t, i)=>{
        const item = document.createElement("div");
        item.className = "trackItem" + (i === trackIndex ? " active" : "");
        item.setAttribute("role", "button");
        item.setAttribute("tabindex", "0");

        const idx = document.createElement("div");
        idx.className = "trackIdx";
        idx.textContent = String(i+1);

        const name = document.createElement("div");
        name.className = "trackName";
        name.textContent = t.name;

        const meta = document.createElement("div");
        meta.className = "trackMeta";
        meta.textContent = (i === trackIndex) ? (isMusicPausedNow() ? "目前" : "播放中") : "";

        item.appendChild(idx);
        item.appendChild(name);
        item.appendChild(meta);

        const go = ()=>{
          const autoplay = isPlaying || !isMusicPausedNow();
          setTrack(i, {autoplay});
          // 切歌後更新清單高亮
          renderPlaylist();
        };
        item.addEventListener("click", go);
        item.addEventListener("keydown", (e)=>{ if (e.key === "Enter" || e.key === " "){ e.preventDefault(); go(); } });

        playlistPanel.appendChild(item);
      });
    }

    function togglePlaylist(open){
      if (!playlistPanel) return;
      const willOpen = (open === undefined) ? !playlistPanel.classList.contains("show") : open;
      playlistPanel.classList.toggle("show", willOpen);
      if (willOpen) renderPlaylist();
    }

    if (playlistBtn) playlistBtn.addEventListener("click", (e)=>{
      e.stopPropagation();
      togglePlaylist();
    });

    // 點其它地方關閉清單
    window.addEventListener("click", ()=>{
      if (!playlistPanel) return;
      playlistPanel.classList.remove("show");
    });
    if (playlistPanel) playlistPanel.addEventListener("click", (e)=> e.stopPropagation());


    function musicVolumePercentText(){
      const v = desiredMusicVolume();
      const percent = (bgm.muted || v === 0) ? 0 : Math.round(v * 100);
      const isMobileLayout = window.matchMedia && window.matchMedia("(max-width: 760px)").matches;
      return (isMobileLayout ? "音量" : "") + percent + "%";
    }

    function syncMusicButtons(){
      const volumeText = musicVolumePercentText();

      if (!tracks.length){
        musicBtn.textContent = "♪ 播放";
        muteBtn.textContent = volumeText;
        muteBtn.title = "音量：" + volumeText + "（Shift+M 靜音切換）";
        loopBtn.textContent = "🔁";
        loopBtn.style.opacity = "0.7";
        muteBtn.style.opacity = "0.7";
        musicBtn.style.opacity = "0.7";
        if (prevTrackBtn) prevTrackBtn.style.opacity = "0.7";
        if (nextTrackBtn) nextTrackBtn.style.opacity = "0.7";
        return;
      }

      musicBtn.style.opacity = "1";
      muteBtn.style.opacity = "1";
      loopBtn.style.opacity = "1";
      if (prevTrackBtn) prevTrackBtn.style.opacity = "1";
      if (nextTrackBtn) nextTrackBtn.style.opacity = "1";

      musicBtn.textContent = isMusicPausedNow() ? "♪ 播放" : "暫停";
      muteBtn.textContent = volumeText;
      muteBtn.title = "音量：" + volumeText + "（Shift+M 靜音切換）";
      loopBtn.textContent = playlistLoop ? "🔁" : "➡️";
      loopBtn.style.opacity = playlistLoop ? "1" : "0.85";
    }

    async function tryPlayMusic(){
      if (!tracks.length) return;

      if (useWebAudio){
        try{
          ensureAudioCtx();
          if (audioCtx && audioCtx.state === "suspended"){
            try{ await audioCtx.resume(); }catch(e){}
          }
          if (waTrackIndex !== trackIndex || !waBuffer){
            waBuffer = await waGetBuffer(trackIndex);
            waTrackIndex = trackIndex;
            waOffset = 0;
          }
          waStopSource();
          waSource = audioCtx.createBufferSource();
          waSource.buffer = waBuffer;
          waSource.connect(gainNode);
          waApplyVolume();
          waStartAt = audioCtx.currentTime;
          waIsPlaying = true;

          waSource.onended = ()=>{
            // 若是手動 stop/pause，這裡可能也會觸發；用旗標保護
            if (!waIsPlaying) return;
            waIsPlaying = false;
            waOffset = 0;
            handleMusicEnded();
          };

          waSource.start(0, waOffset);
          setMusicStatus(currentTrackLabel() + "（播放中）");
          startWaRaf();
        }catch(e){
          // WebAudio 失敗時：退回到 <audio>（最後的保命方案）
          useWebAudio = false;
          try{
            const t = tracks[trackIndex];
            bgm.src = t.url;
            bgm.currentTime = 0;
            applyAudioOutputVolume(desiredMusicVolume());
            await bgm.play();
          }catch(e2){
            // 可能需要使用者再次點按，忽略即可
          }
        }
        syncMusicButtons();
        if (typeof renderPlaylist === "function") renderPlaylist();
        return;
      }

      try{
        applyAudioOutputVolume(desiredMusicVolume());
        await bgm.play();
      }catch(e){
        // 可能需要使用者再次點按，忽略即可
      }
      syncMusicButtons();
      if (typeof renderPlaylist === "function") renderPlaylist();
    }

    function pauseMusic(){
      if (!tracks.length) return;

      if (useWebAudio){
        if (!audioCtx) { syncMusicButtons(); return; }
        if (!waIsPlaying){ syncMusicButtons(); return; }
        const elapsed = Math.max(0, audioCtx.currentTime - waStartAt);
        const dur = waBuffer ? waBuffer.duration : 0;
        waOffset = Math.max(0, Math.min(dur, waOffset + elapsed));
        waIsPlaying = false;
        waStopSource();
        stopWaRaf();
        setMusicStatus(currentTrackLabel() + "（已就緒）");
        syncMusicButtons();
        if (typeof renderPlaylist === "function") renderPlaylist();
        return;
      }

      if (!bgm.paused) bgm.pause();
      syncMusicButtons();
      if (typeof renderPlaylist === "function") renderPlaylist();
    }

    // 「停止」：比暫停更徹底，會把播放位置歸零（不清掉清單）
    function stopMusicHard(){
      if (!tracks.length) return;

      if (useWebAudio){
        try{
          waIsPlaying = false;
          waOffset = 0;
          waStopSource();
          stopWaRaf();
        }catch(e){}
        setMusicStatus(currentTrackLabel() + "（已就緒）");
        syncMusicButtons();
        if (typeof renderPlaylist === "function") renderPlaylist();
        return;
      }

      try{
        bgm.pause();
        bgm.currentTime = 0;
      }catch(e){}
      updateMusicBar();
      setMusicStatus(currentTrackLabel() + "（已就緒）");
      syncMusicButtons();
      if (typeof renderPlaylist === "function") renderPlaylist();
    }

    function stopAll(){
      // 幻燈片停止（等同按暫停）
      if (isPlaying) setPlaying(false);
      else stopLoop();

      // 音樂停止並歸零
      stopMusicHard();
      showToast("已停止：幻燈片 + 音樂");
    }



    function toggleMusic(){
      // 改為「同步播放/暫停」：音樂與幻燈片狀態一致
      if (isPlaying || (!isMusicPausedNow() && tracks.length)) setPlaying(false);
      else setPlaying(true);
    }


    function toggleMute(){
      if (!tracks.length) return;
      bgm.muted = !bgm.muted;
      if (useWebAudio){
        waApplyVolume();
      }
      syncMusicButtons();
    }


    function toggleLoop(){
      if (!tracks.length) return;
      playlistLoop = !playlistLoop;
      syncMusicButtons();
      setMusicStatus(currentTrackLabel() + (isMusicPausedNow() ? "（已就緒）" : "（播放中）"));
      showToast(playlistLoop ? "清單循環：開" : "清單循環：關");
    }


    function setVolume(v){
      const val = Math.max(0, Math.min(1, Number(v)));
      vol.value = String(val);
      if (val > 0) bgm.muted = false;
      applyAudioOutputVolume(val);
      syncMusicButtons();
    }


    function appendAudioFiles(fileList, label){
      const all = Array.from(fileList || []);
      if (!all.length) return;

      const okExt = /\.(mp3|wav|m4a|aac|ogg|flac)$/i;
      const files = all.filter(f => ((f.type || "").startsWith("audio/") || okExt.test(f.name || "")));

      if (!files.length){
        showToast("沒有辨識到可播放的音樂檔（建議 mp3 / m4a / wav / ogg）");
        return;
      }

      // ✅ 允許跨目錄／整個資料夾：多次選取會「累加」到音樂清單（不覆蓋）
      // 去重：name + size + lastModified
      const existed = new Set((tracks || []).map(t => t && t._key ? t._key : ""));
      let added = 0;

      for (const f of files){
        const key = [f.name || "", String(f.size || 0), String(f.lastModified || 0)].join("::");
        if (existed.has(key)) continue;
        existed.add(key);

        // 顯示名稱：若有相對路徑就顯示（資料夾匯入時比較清楚）
        const displayName = (f.webkitRelativePath && f.webkitRelativePath.trim()) ? f.webkitRelativePath : (f.name || "未命名音樂");

        tracks.push({
          name: displayName,
          url: URL.createObjectURL(f),
          file: f,
          buffer: null,
          _key: key
        });
        added += 1;
      }

      if (!added){
        showToast("這批音樂已在清單中");
        syncMusicButtons();
        if (typeof renderPlaylist === "function") renderPlaylist();
        return;
      }

      // 如果原本沒有曲目，或目前曲目失效，就把第一首設為目前曲目（不自動播放）
      if (tracks.length && (!tracks[trackIndex] || !bgm.src)){
        try{
          bgm.pause();
          bgm.muted = false;
          bgm.volume = desiredMusicVolume();
        }catch(e){}
        trackIndex = 0;
        try{ setTrack(0, {autoplay:false}); }catch(e){}
      }

      setMusicStatus(currentTrackLabel() + "（已就緒）");
      syncMusicButtons();
      if (typeof renderPlaylist === "function") renderPlaylist();
      if (playlistPanel) playlistPanel.classList.remove("show");
      showToast((label ? (label + "：") : "") + "已加入 " + added + " 首（目前共 " + tracks.length + " 首）— 不會自動播放");
    }

    audioFile.addEventListener("change", (e)=>{
      appendAudioFiles(e.target.files || [], "加入音樂");
      audioFile.value = "";
    });

    audioFolder?.addEventListener("change", (e)=>{
      appendAudioFiles(e.target.files || [], "加入音樂資料夾");
      audioFolder.value = "";
    });
 
    musicBtn.addEventListener("click", toggleMusic);
    if (prevTrackBtn) prevTrackBtn.addEventListener("click", ()=>{
      if (!tracks.length) return;
      const autoplay = isPlaying || !isMusicPausedNow();
      setTrack(trackIndex - 1, {autoplay});
    });
    if (nextTrackBtn) nextTrackBtn.addEventListener("click", ()=>{
      if (!tracks.length) return;
      const autoplay = isPlaying || !isMusicPausedNow();
      setTrack(trackIndex + 1, {autoplay});
    });
    muteBtn.addEventListener("click", toggleMute);
    loopBtn.addEventListener("click", toggleLoop);
    vol.addEventListener("input", (e)=> setVolume(e.target.value));

    bgm.addEventListener("play", ()=>{ if (tracks.length) setMusicStatus(currentTrackLabel() + "（播放中）"); syncMusicButtons(); if (typeof renderPlaylist === "function") renderPlaylist(); });
    bgm.addEventListener("pause", ()=>{ if (tracks.length) setMusicStatus(currentTrackLabel() + "（已暫停）"); syncMusicButtons(); if (typeof renderPlaylist === "function") renderPlaylist(); });
    bgm.addEventListener("ended", ()=>{
      if (useWebAudio) return;
      handleMusicEnded();
    });

    /** @type {{id:string, name:string, size:number, type:string, addedAt:number, url:string}[]} */
    let idSeq = 0;
    function genId(){
      // 不用 crypto.randomUUID：避免相容性風險；這裡只需要「本頁唯一」即可
      idSeq = (idSeq + 1) % 1000000000;
      return 'id_' + Date.now().toString(36) + '_' + (idSeq).toString(36) + '_' + Math.random().toString(36).slice(2,8);
    }

    let items = [];
    let filtered = [];
    let currentIndex = 0;

    let isPlaying = false;
    let slideLoop = true; // 幻燈片循環：開=播到最後回第一張；關=播完停止

    let timerId = null;
    let progId = null;
    let startedAt = 0;

    function formatBytes(bytes){
      const mb = bytes / (1024 * 1024);
      if (!bytes) return "—";
      if (mb < 1) return (bytes / 1024).toFixed(0) + " KB";
      return mb.toFixed(2) + " MB";
    }

    function speedMs(){
      return Number(speedSel.value || 3000);
    }

    
    function syncSlideLoopButton(){
      if (!slideLoopBtn) return;
      slideLoopBtn.textContent = slideLoop ? "🔁 循環" : "➡️ 單次";
      slideLoopBtn.style.opacity = "1";
    }

    function toggleSlideLoop(){
      slideLoop = !slideLoop;
      syncSlideLoopButton();
      showToast(slideLoop ? "幻燈片循環：開" : "幻燈片循環：關（單次）");
    }

function setPlaying(next){
      isPlaying = next;
      playBtn.textContent = isPlaying ? "❚❚ 暫停" : "▶ 播放";
      playBtn.classList.toggle("primary", !isPlaying);

      if (isPlaying){
        startLoop();
        // 同步：開始幻燈片時嘗試播放音樂
        tryPlayMusic();
      } else {
        stopLoop();
        // 同步：停止/暫停幻燈片時音樂也暫停
        pauseMusic();
      }
    }

    function stopLoop(){
      if (timerId) clearInterval(timerId);
      if (progId) clearInterval(progId);
      timerId = null;
      progId = null;
      progressBar.style.width = "0%";
    }

    function startLoop(){
      stopLoop();
      if (!filtered.length) return;
      startedAt = Date.now();

      progId = setInterval(()=>{
        const dur = speedMs();
        const t = (Date.now() - startedAt) / dur;
        const p = Math.max(0, Math.min(1, t));
        progressBar.style.width = (p * 100).toFixed(1) + "%";
      }, 50);

      timerId = setInterval(()=>{
        // 讓圖片一直循環播放：最後一張後回到第一張
        startedAt = Date.now();
        progressBar.style.width = "0%";
        if (currentIndex >= filtered.length - 1){
          if (slideLoop){
            currentIndex = 0;
            render();
          } else {
            // 單次模式：播到最後一張就停止（同步暫停音樂，但不歸零）
            setPlaying(false);
            progressBar.style.width = "0%";
            showToast("幻燈片播放結束");
          }
        } else {
          step(1, {keepPlaying:true});
        }
      }, speedMs());
    }

    function updateStats(){
      countChip.textContent = `${filtered.length} 張`;
      posChip.textContent = filtered.length ? `第 ${currentIndex+1} / ${filtered.length}` : "—";
    }

    function applyFilter(){
      const q = "";
      filtered = items.filter(x => x.name.toLowerCase().includes(q));
      if (currentIndex >= filtered.length) currentIndex = Math.max(0, filtered.length - 1);
      render();
    }

    function render(){
      empty.style.display = filtered.length ? "none" : "block";
      stage.style.display = filtered.length ? "block" : "none";

      if (!filtered.length){
        isPlaying = false;
        playBtn.textContent = "▶ 播放";
        playBtn.classList.toggle("primary", true);
        stopLoop();
        titleName.textContent = "—";
        titleSub.textContent = "—";
        infoText.textContent = "—";
        thumbs.innerHTML = "";
        updateStats();
        return;
      }

      const x = filtered[currentIndex];
      stageImg.src = x.url;
      titleName.textContent = x.name;

      const dt = new Date(x.addedAt);
      titleSub.textContent = `加入時間：${dt.toLocaleString("zh-Hant")}`;

      infoText.textContent = `${x.type || "image"}　•　${formatBytes(x.size)}　•　第 ${currentIndex+1}/${filtered.length} 張`;
      updateStats();
      renderThumbs();

      if (isPlaying){
        startedAt = Date.now();
        progressBar.style.width = "0%";
      }
    }

    function renderThumbs(){
      thumbs.innerHTML = "";
      filtered.forEach((x, i)=>{
        const d = document.createElement("div");
        d.className = "thumb" + (i === currentIndex ? " active" : "");
        d.title = x.name;

        const img = document.createElement("img");
        img.loading = "lazy";
        img.src = x.url;
        img.alt = x.name;

        d.appendChild(img);
        d.addEventListener("click", ()=>{
          // 點縮圖：跳到該張，並自動暫停播放（含音樂同步停止）
          if (isPlaying) setPlaying(false);
          currentIndex = i;
          render();
        });
        thumbs.appendChild(d);
      });

      const active = thumbs.querySelector(".thumb.active");
      if (active){
        // V61：播放換張時只讓縮圖列「橫向」跟著目前照片，不讓整個頁面上下捲動。
        // 原本的 scrollIntoView() 會在自動播放時把畫面往下拉，導致上方功能列被藏起來。
        const left = active.offsetLeft - (thumbs.clientWidth - active.offsetWidth) / 2;
        thumbs.scrollTo({left: Math.max(0, left), behavior:"smooth"});
      }
    }

    function step(dir, {keepPlaying=false} = {}){
      if (!filtered.length) return;
      currentIndex = (currentIndex + dir + filtered.length) % filtered.length;
      render();
    }

    function addFiles(fileList){
      const files = Array.from(fileList).filter(f => f.type.startsWith("image/"));
      if (!files.length) return;

      for (const f of files){
        const url = URL.createObjectURL(f);
        items.push({
          id: genId(),
          name: (f.webkitRelativePath && f.webkitRelativePath.trim()) ? f.webkitRelativePath : (f.name || "未命名"),
          size: f.size || 0,
          type: f.type || "",
          addedAt: Date.now() + Math.random(),
          url
        });
      }

      applyFilter();
      if (filtered.length && currentIndex === 0){
        render();
      }
    }

    function downloadCurrent(){
      const x = filtered[currentIndex];
      if (!x) return;
      const a = document.createElement("a");
      a.href = x.url;
      a.download = x.name;
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    function removeCurrent(){
      const x = filtered[currentIndex];
      if (!x) return;

      const idx = items.findIndex(i => i.id === x.id);
      if (idx !== -1){
        if (items[idx].url.startsWith("blob:")) URL.revokeObjectURL(items[idx].url);
        items.splice(idx, 1);
      }

      applyFilter();
      if (!filtered.length){
        currentIndex = 0;
        render();
        return;
      }
      if (currentIndex >= filtered.length) currentIndex = filtered.length - 1;
      render();
    }

    async function toggleFullscreen(){
      try{
        if (!document.fullscreenElement){
          await stage.requestFullscreen?.();
        } else {
          await document.exitFullscreen?.();
        }
      }catch(e){}
    }

    // ===== Events =====
    fileInput.addEventListener("change", (e)=>{
      addFiles(e.target.files);
      fileInput.value = "";
    });

    folderInput?.addEventListener("change", (e)=>{
      addFiles(e.target.files || []);
      folderInput.value = "";
    });
speedSel.addEventListener("change", ()=>{
      if (isPlaying) startLoop();
    });

    clearPhotosBtn.addEventListener("click", ()=>{
      // V61：只清空相片，不動音樂清單與目前音樂播放狀態。
      isPlaying = false;
      playBtn.textContent = "▶ 播放";
      playBtn.classList.toggle("primary", true);
      stopLoop();
      for (const x of items){
        if (x.url.startsWith("blob:")) URL.revokeObjectURL(x.url);
      }
      items = [];
      filtered = [];
      currentIndex = 0;
      applyFilter();
      showToast("已清空相片");
    });

    clearMusicBtn.addEventListener("click", ()=>{
      // V61：只清空音樂，不動相片。
      bgm.pause();
      bgm.src = "";
      revokeTracks();
      setMusicStatus("音樂：未載入");
      syncMusicButtons();
      showToast("已清空音樂");
    });

    prevBtn.addEventListener("click", ()=>step(-1));
    nextBtn.addEventListener("click", ()=>step(1));
    navPrev.addEventListener("click", ()=>step(-1));
    navNext.addEventListener("click", ()=>step(1));

    // V47：碰觸／點擊中間照片顯示區時，暫停／恢復播放（同步音樂）。
    stageImg.addEventListener("pointerdown", ()=>{
      if (!filtered.length) return;
      const nextPlaying = !isPlaying;
      setPlaying(nextPlaying);
      showToast(nextPlaying ? "恢復播放" : "已暫停");
    });

    playBtn.addEventListener("click", ()=>setPlaying(!isPlaying));
    slideLoopBtn?.addEventListener("click", toggleSlideLoop);

    stopAllBtn?.addEventListener("click", stopAll);
    fullscreenBtn.addEventListener("click", toggleFullscreen);
    downloadBtn.addEventListener("click", downloadCurrent);
    removeBtn.addEventListener("click", removeCurrent);

    // Drag & drop
    ["dragenter","dragover"].forEach(ev=>{
      dropzone.addEventListener(ev, (e)=>{
        e.preventDefault(); e.stopPropagation();
        dropzone.classList.add("dragover");
      });
    });
    ["dragleave","drop"].forEach(ev=>{
      dropzone.addEventListener(ev, (e)=>{
        e.preventDefault(); e.stopPropagation();
        dropzone.classList.remove("dragover");
      });
    });
    dropzone.addEventListener("drop", (e)=> addFiles(e.dataTransfer.files));

    // Keyboard（更穩：使用 capture，且只在輸入框/可編輯元素時忽略）
    function isTypingTarget(el){
      if (!el) return false;
      const tag = (el.tagName || "").toLowerCase();
      if (tag === "input" || tag === "textarea" || tag === "select") return true;
      if (el.isContentEditable) return true;
      return false;
    }

    function keyHandler(e){
      // 若正在輸入文字，就不要搶快捷鍵
      if (isTypingTarget(e.target) || isTypingTarget(document.activeElement)) return;

      const k = e.key;

      if (k === "ArrowLeft"){
        e.preventDefault();
        step(-1);
        return;
      }
      if (k === "ArrowRight"){
        e.preventDefault();
        step(1);
        return;
      }
      if (k === " " || k === "Spacebar"){
        e.preventDefault();
        setPlaying(!isPlaying); // 同步控制音樂
        return;
      }
      if (String(k).toLowerCase() === "m"){
        e.preventDefault();
        // Shift+M：靜音；M：播放/暫停（同步）
        if (e.shiftKey) toggleMute();
        else toggleMusic();
        return;
      }
      if (String(k).toLowerCase() === "s"){
        e.preventDefault();
        stopAll();
        return;
      }
    }

    // 用 capture=true，避免某些元素先吃掉按鍵事件（Firefox 上更保險）
    window.addEventListener("keydown", keyHandler, true);

    function onFullscreenChange(){
      const isFs = !!document.fullscreenElement;

      // 進入全螢幕後，把焦點放在舞台上（避免按鍵被別的元素吃掉）
      if (isFs){
        stage?.focus?.();
      }

      // 全螢幕提示只顯示 10 秒
      if (fsHint){
        clearTimeout(fsHintTimer);
        fsHintTimer = null;
        if (isFs){
          fsHint.classList.add('show');
          fsHintTimer = setTimeout(()=>{
            fsHint.classList.remove('show');
            fsHintTimer = null;
          }, 10000);
        } else {
          fsHint.classList.remove('show');
        }
      }
    }

    document.addEventListener("fullscreenchange", onFullscreenChange);
    document.addEventListener("webkitfullscreenchange", onFullscreenChange);

    

    setVolume(DEFAULT_MUSIC_VOLUME);
    window.addEventListener("resize", syncMusicButtons);

    syncMusicButtons();
    syncSlideLoopButton();
    if (typeof renderPlaylist === "function") renderPlaylist();
    applyFilter();
    render();
  

    // ===== V61 PWA registration =====
    if ('serviceWorker' in navigator){
      window.addEventListener('load', ()=>{
        navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
      });
    }
</script>
</body>
